name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow-failure }}

    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - 27-2
          - 28-2
          - 29-1
          - snapshot
        allow-failure: [false]
        include:
          - emacs-version: 26-3
            allow-failure: true

    steps:
    - uses: actions/checkout@v4

    - name: Install Emacs ${{ matrix.emacs-version }}
      uses: purcell/setup-emacs@master
      with:
        version: ${{ matrix.emacs-version }}

    - name: Install Eask
      uses: emacs-eask/setup-eask@master
      with:
        version: 'snapshot'

    - name: Install dependencies
      run: eask install-deps --dev

    - name: Print org-mode version
      run: eask exec emacs --batch -l org --eval "(princ (org-version))"

    - name: Byte compile
      run: eask compile

    - name: Run tests
      run: eask run script test
